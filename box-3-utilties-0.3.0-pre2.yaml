    y_max: 232
    on_press:
      then:
        - lambda: |-
            id(last_touch_ms) = millis();
            id(water_tile_pressed) = true;
        - script.execute: request_draw
        - delay: 120ms
        - lambda: |-
            id(water_tile_pressed) = false;
            id(current_page_id) = 2;
        - display.page.show: water_page
        - script.execute: request_draw

  - platform: touchscreen
    page_id: water_page
    id: water_back
    x_min: 0
    x_max: 100
    y_min: 0
    y_max: 40
    on_press:
      then:
        - lambda: |-
            id(last_touch_ms) = millis();
            id(water_back_pressed) = true;
        - script.execute: request_draw
    on_release:
      then:
        - lambda: |-
            id(water_back_pressed) = false;
            id(current_page_id) = 0;
        - display.page.show: home_page
        - script.execute: request_draw

  - platform: touchscreen
    page_id: weather_page
    id: weather_back
    x_min: 0
    x_max: 110
    y_min: 0
    y_max: 40
    on_press:
      then:
        - lambda: |-
            id(last_touch_ms) = millis();
            id(weather_back_pressed) = true;
        - script.execute: request_draw
    on_release:
      then:
