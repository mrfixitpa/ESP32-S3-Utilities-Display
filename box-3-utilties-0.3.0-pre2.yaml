# Version: 0.3.0-pre3
#
# Changes from 0.3.0-pre2:
# - Climate page touch controls changed from on_click to on_press
# - Enlarged climate-page touch zones for easier tapping
# - Added logger messages to climate-page touch controls for debugging
# - Added pressed visual feedback for climate temp and back buttons
# - Adjusted climate room temp and temp button alignment

substitutions:
  thermostat_entity: climate.ecobee_thermostat

interval:
  - interval: 30s
    then:
      - script.execute: request_draw

sensor:
  - platform: homeassistant
    id: avg_indoor_temp
    entity_id: sensor.average_indoor_temperature
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: outdoor_temp
    entity_id: sensor.outdoor_temperature
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: electric_power_w
    entity_id: sensor.house_electric_meter_power_minute_average
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: electric_energy_month
    entity_id: sensor.house_electric_meter_energy_this_month
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: template
    id: gas_now_flow
    lambda: |-
      return 0.0;
    update_interval: 5s
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: template
    id: gas_month_ccf
    lambda: |-
      return 12.3;
    update_interval: 10s
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: water_day_gal
    entity_id: sensor.daily_water_usage
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: water_week_gal
    entity_id: sensor.weekly_water_usage
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: water_month_gal
    entity_id: sensor.monthly_water_usage
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: climate_current_temp
    entity_id: sensor.ecobee_thermostat_current_temperature
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: climate_current_humidity
    entity_id: sensor.ecobee_thermostat_current_humidity
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: climate_target_temp
    entity_id: ${thermostat_entity}
    attribute: temperature
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: climate_target_low
    entity_id: ${thermostat_entity}
    attribute: target_temp_low
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: climate_target_high
    entity_id: ${thermostat_entity}
    attribute: target_temp_high
    internal: true
    on_value:
      - script.execute: request_draw

text_sensor:
  - platform: homeassistant
    id: hvac_action
    entity_id: ${thermostat_entity}
    attribute: hvac_action
    internal: true
    on_value:
      - script.execute: request_draw

  - platform: homeassistant
    id: climate_mode
    entity_id: ${thermostat_entity}
    internal: true
    on_value:
      - script.execute: request_draw

font:
  - file:
      type: gfonts
      family: Figtree
      weight: 600
    id: font_title
    size: 18

  - file:
      type: gfonts
      family: Figtree
      weight: 500
    id: font_label
    size: 14

  - file:
      type: gfonts
      family: Figtree
      weight: 700
    id: font_value
    size: 20

  - file:
      type: gfonts
      family: Figtree
      weight: 700
    id: font_big
    size: 30

  - file:
      type: gfonts
      family: Figtree
      weight: 700
    id: font_mode
    size: 16

  - file: https://unpkg.com/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf
    id: font_mdi
    size: 22
    glyphs:
      - "󰈸"
      - "󰜗"
      - "\U000F140C"
      - "\U000F0E0A"
      - "\U000F0B28"
      - "\U000F0B26"
      - "\U000F0B2C"

globals:
  - id: climate_back_pressed
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: climate_temp_down_pressed
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: climate_temp_up_pressed
    type: bool
    restore_value: no
    initial_value: 'false'

display:
  - platform: ili9xxx
    model: S3BOX
    id: box_display
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin:
      number: GPIO48
      inverted: true
    invert_colors: false
    update_interval: never
    pages:
      - id: home_page
        lambda: |-
          const Color paper = Color(255,255,255);
          const Color ink   = Color(0,0,0);

          it.fill(paper);

          auto fill_round = [&](int x, int y, int w, int h, int r, Color c) {
            it.filled_rectangle(x+r, y, w-2*r, h, c);
            it.filled_rectangle(x, y+r, r, h-2*r, c);
            it.filled_rectangle(x+w-r, y+r, r, h-2*r, c);
            it.filled_circle(x+r, y+r, r, c);
            it.filled_circle(x+w-r-1, y+r, r, c);
            it.filled_circle(x+r, y+h-r-1, r, c);
            it.filled_circle(x+w-r-1, y+h-r-1, r, c);
          };

          auto tile = [&](int x, int y, int w, int h, int r) {
            fill_round(x, y, w, h, r, ink);
            fill_round(x+1, y+1, w-2, h-2, r-1, paper);
          };

          const int LEFT_X = 10;
          const int RIGHT_X = 310;
          const int OUT_GAP = 54;

          it.print(LEFT_X, 8, id(font_label), ink, "Indoor");
          it.printf(LEFT_X + 52, 6, id(font_value), ink, "%.0f°", id(avg_indoor_temp).state);

          it.print(RIGHT_X - OUT_GAP, 8, id(font_label), ink, TextAlign::TOP_RIGHT, "Outdoor");
          it.printf(RIGHT_X, 6, id(font_value), ink, TextAlign::TOP_RIGHT, "%.0f°", id(outdoor_temp).state);

          const std::string act = id(hvac_action).state;
          if (act == "heating") {
            it.print(152, 6, id(font_mdi), ink, "󰈸");
          } else if (act == "cooling") {
            it.print(152, 6, id(font_mdi), ink, "󰜗");
          }

          it.line(10, 34, 310, 34, ink);

          int y = 44;
          const int h = 56;

          tile(10, y, 300, h, 14);
          it.print(22, y+14, id(font_mdi), ink, "\U000F140C");
          it.print(44, y+10, id(font_title), ink, "Electricity");
          it.printf(44, y+34, id(font_label), ink, "Now %.0f W", id(electric_power_w).state);
          it.printf(170, y+34, id(font_label), ink, "Month %.1f kWh", id(electric_energy_month).state);

          y += h + 10;
          tile(10, y, 300, h, 14);
          it.print(22, y+14, id(font_mdi), ink, "󰈸");
          it.print(44, y+10, id(font_title), ink, "Gas");
          it.printf(44, y+34, id(font_label), ink, "Now %.2f", id(gas_now_flow).state);
          it.printf(170, y+34, id(font_label), ink, "Month %.1f CCF", id(gas_month_ccf).state);

          y += h + 10;
          tile(10, y, 300, h, 14);
          it.print(22, y+14, id(font_mdi), ink, "\U000F0E0A");
          it.print(44, y+10, id(font_title), ink, "Water");
          it.printf(170, y+12, id(font_label), ink, "Weekly:. %.0f gal", id(water_week_gal).state);
          it.printf(44, y+36, id(font_label), ink, "Daily:. %.0f gal", id(water_day_gal).state);
          it.printf(170, y+36, id(font_label), ink, "Monthly:. %.0f gal", id(water_month_gal).state);

      - id: climate_page
        lambda: |-
          const Color paper = Color(255,255,255);
          const Color ink   = Color(0,0,0);

          it.fill(paper);

          auto fill_round = [&](int x, int y, int w, int h, int r, Color c) {
            it.filled_rectangle(x+r, y, w-2*r, h, c);
            it.filled_rectangle(x, y+r, r, h-2*r, c);
            it.filled_rectangle(x+w-r, y+r, r, h-2*r, c);
            it.filled_circle(x+r, y+r, r, c);
            it.filled_circle(x+w-r-1, y+r, r, c);
            it.filled_circle(x+r, y+h-r-1, r, c);
            it.filled_circle(x+w-r-1, y+h-r-1, r, c);
          };

          auto tile = [&](int x, int y, int w, int h, int r) {
            fill_round(x, y, w, h, r, ink);
            fill_round(x+1, y+1, w-2, h-2, r-1, paper);
          };

          auto fill_tile = [&](int x, int y, int w, int h, int r) {
            fill_round(x, y, w, h, r, ink);
          };

          auto mode_button = [&](int x, const char *label, bool active) {
            tile(x, 140, 68, 40, 10);
            if (active) {
              it.filled_rectangle(x + 1, 141, 66, 4, ink);
            }
            it.printf(x + 34, 160, id(font_mode), ink, TextAlign::CENTER, "%s", label);
          };

          float current_temp = id(climate_current_temp).state;
          if (!(current_temp == current_temp)) {
            current_temp = id(avg_indoor_temp).state;
          }

          float current_humidity = id(climate_current_humidity).state;
          std::string mode_text = id(climate_mode).state;
          std::string action_text = id(hvac_action).state;

          if (mode_text == "heat_cool") mode_text = "Auto";
          else if (mode_text == "heat") mode_text = "Heat";
          else if (mode_text == "cool") mode_text = "Cool";
          else if (mode_text == "off") mode_text = "Off";

          if (action_text == "heating") action_text = "Heating";
          else if (action_text == "cooling") action_text = "Cooling";
          else if (action_text == "idle") action_text = "Idle";
          else if (action_text.empty()) action_text = "--";

          std::string target_text = "--";
          if (id(climate_mode).state == "heat_cool") {
            if ((id(climate_target_low).state == id(climate_target_low).state) &&
                (id(climate_target_high).state == id(climate_target_high).state)) {
              target_text = str_sprintf("%.0f° / %.0f°",
                id(climate_target_low).state,
                id(climate_target_high).state);
            }
          } else {
            if (id(climate_target_temp).state == id(climate_target_temp).state) {
              target_text = str_sprintf("%.0f°", id(climate_target_temp).state);
            }
          }

          // Header with pressed feedback on back button
          if (id(climate_back_pressed)) {
            fill_tile(10, 4, 84, 26, 10);
            it.print(16, 6, id(font_mdi), paper, "\U000F0B28");
            it.print(42, 8, id(font_title), paper, "Climate");
          } else {
            it.print(16, 6, id(font_mdi), ink, "\U000F0B28");
            it.print(42, 8, id(font_title), ink, "Climate");
          }
          it.line(10, 34, 310, 34, ink);

          tile(18, 44, 124, 90, 14);
          it.print(40, 52, id(font_label), ink, "Room");
          it.printf(58, 82, id(font_big), ink, "%.0f°", current_temp);

          tile(154, 44, 148, 26, 10);
          it.print(166, 51, id(font_label), ink, "Target");
          it.printf(290, 51, id(font_label), ink, TextAlign::TOP_RIGHT, "%s", target_text.c_str());

          tile(154, 76, 148, 26, 10);
          it.print(166, 83, id(font_label), ink, "Mode");
          it.printf(290, 83, id(font_label), ink, TextAlign::TOP_RIGHT, "%s", mode_text.c_str());

          tile(154, 108, 148, 26, 10);
          it.print(166, 115, id(font_label), ink, "Humidity");
          if (current_humidity == current_humidity) {
            it.printf(290, 115, id(font_label), ink, TextAlign::TOP_RIGHT, "%.0f%%", current_humidity);
          } else {
            it.printf(290, 115, id(font_label), ink, TextAlign::TOP_RIGHT, "--");
          }

          mode_button(18,  "Off",  id(climate_mode).state == "off");
          mode_button(92,  "Cool", id(climate_mode).state == "cool");
          mode_button(166, "Heat", id(climate_mode).state == "heat");
          mode_button(240, "Auto", id(climate_mode).state == "heat_cool");

          // Bottom temp controls with pressed feedback
          tile(18, 188, 284, 44, 14);

          if (id(climate_temp_down_pressed)) {
            fill_tile(18, 188, 64, 44, 12);
            it.print(50, 206, id(font_mdi), paper, TextAlign::CENTER, "\U000F0B26");
          } else {
            tile(18, 188, 64, 44, 12);
            it.print(50, 206, id(font_mdi), ink, TextAlign::CENTER, "\U000F0B26");
          }

          std::string center_text = target_text;
          if (center_text == "--") {
            center_text = action_text;
          }
          it.printf(160, 202, id(font_title), ink, TextAlign::CENTER, "%s", center_text.c_str());

          if (id(climate_temp_up_pressed)) {
            fill_tile(238, 188, 64, 44, 12);
            it.print(270, 206, id(font_mdi), paper, TextAlign::CENTER, "\U000F0B2C");
          } else {
            tile(238, 188, 64, 44, 12);
            it.print(270, 206, id(font_mdi), ink, TextAlign::CENTER, "\U000F0B2C");
          }

touchscreen:
  - platform: gt911
    id: gt911_touchscreen
    display: box_display
    i2c_id: bus_a
    address: 0x5D
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true

binary_sensor:
  - platform: touchscreen
    page_id: home_page
    id: top_row_left_climate
    x_min: 0
    x_max: 160
    y_min: 0
    y_max: 34
    on_click:
      then:
        - display.page.show: climate_page
        - script.execute: request_draw

  - platform: touchscreen
    page_id: climate_page
    id: climate_back
    x_min: 0
    x_max: 90
    y_min: 0
    y_max: 40
    on_press:
      then:
        - lambda: |-
            id(climate_back_pressed) = true;
        - script.execute: request_draw
    on_release:
      then:
        - logger.log: "Climate back pressed"
        - lambda: |-
            id(climate_back_pressed) = false;
        - display.page.show: home_page
        - script.execute: request_draw

  - platform: touchscreen
    page_id: climate_page
    id: climate_mode_off
    x_min: 10
    x_max: 95
    y_min: 132
    y_max: 186
    on_press:
      then:
        - logger.log: "Climate mode OFF pressed"
        - homeassistant.service:
            service: climate.set_hvac_mode
            data:
              entity_id: ${thermostat_entity}
              hvac_mode: "off"
        - script.execute: request_draw

  - platform: touchscreen
    page_id: climate_page
    id: climate_mode_cool
    x_min: 84
    x_max: 169
    y_min: 132
    y_max: 186
    on_press:
      then:
        - logger.log: "Climate mode COOL pressed"
        - homeassistant.service:
            service: climate.set_hvac_mode
            data:
              entity_id: ${thermostat_entity}
              hvac_mode: "cool"
        - script.execute: request_draw

  - platform: touchscreen
    page_id: climate_page
    id: climate_mode_heat
    x_min: 158
    x_max: 243
    y_min: 132
    y_max: 186
    on_press:
      then:
        - logger.log: "Climate mode HEAT pressed"
        - homeassistant.service:
            service: climate.set_hvac_mode
            data:
              entity_id: ${thermostat_entity}
              hvac_mode: "heat"
        - script.execute: request_draw

  - platform: touchscreen
    page_id: climate_page
    id: climate_mode_auto
    x_min: 232
    x_max: 319
    y_min: 132
    y_max: 186
    on_press:
      then:
        - logger.log: "Climate mode AUTO pressed"
        - homeassistant.service:
            service: climate.set_hvac_mode
            data:
              entity_id: ${thermostat_entity}
              hvac_mode: "heat_cool"
        - script.execute: request_draw

  - platform: touchscreen
    page_id: climate_page
    id: climate_temp_down
    x_min: 8
    x_max: 92
    y_min: 182
    y_max: 239
    on_press:
      then:
        - lambda: |-
            id(climate_temp_down_pressed) = true;
        - script.execute: request_draw
        - logger.log: "Climate temp DOWN pressed"
        - if:
            condition:
              lambda: return id(climate_mode).state == "heat_cool";
            then:
              - homeassistant.service:
                  service: climate.set_temperature
                  data:
                    entity_id: ${thermostat_entity}
                    target_temp_low: !lambda |-
                      float next = id(climate_target_low).state - 1;
                      if (!(next == next)) next = 65;
                      return next;
                    target_temp_high: !lambda |-
                      float high = id(climate_target_high).state;
                      if (!(high == high)) high = 75;
                      return high;
            else:
              - if:
                  condition:
                    lambda: return id(climate_mode).state == "heat" || id(climate_mode).state == "cool";
                  then:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: ${thermostat_entity}
                          temperature: !lambda |-
                            float next = id(climate_target_temp).state - 1;
                            if (!(next == next)) next = id(climate_current_temp).state;
                            if (!(next == next)) next = 70;
                            return next;
        - script.execute: clear_temp_down_feedback

  - platform: touchscreen
    page_id: climate_page
    id: climate_temp_up
    x_min: 228
    x_max: 319
    y_min: 182
    y_max: 239
    on_press:
      then:
        - lambda: |-
            id(climate_temp_up_pressed) = true;
        - script.execute: request_draw
        - logger.log: "Climate temp UP pressed"
        - if:
            condition:
              lambda: return id(climate_mode).state == "heat_cool";
            then:
              - homeassistant.service:
                  service: climate.set_temperature
                  data:
                    entity_id: ${thermostat_entity}
                    target_temp_low: !lambda |-
                      float low = id(climate_target_low).state;
                      if (!(low == low)) low = 65;
                      return low;
                    target_temp_high: !lambda |-
                      float next = id(climate_target_high).state + 1;
                      if (!(next == next)) next = 75;
                      return next;
            else:
              - if:
                  condition:
                    lambda: return id(climate_mode).state == "heat" || id(climate_mode).state == "cool";
                  then:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: ${thermostat_entity}
                          temperature: !lambda |-
                            float next = id(climate_target_temp).state + 1;
                            if (!(next == next)) next = id(climate_current_temp).state;
                            if (!(next == next)) next = 70;
                            return next;
        - script.execute: clear_temp_up_feedback

script:
  - id: request_draw
    mode: restart
    then:
      - component.update: box_display

  - id: clear_temp_down_feedback
    mode: restart
    then:
      - delay: 180ms
      - lambda: |-
          id(climate_temp_down_pressed) = false;
      - script.execute: request_draw

  - id: clear_temp_up_feedback
    mode: restart
    then:
      - delay: 180ms
      - lambda: |-
          id(climate_temp_up_pressed) = false;
      - script.execute: request_draw
