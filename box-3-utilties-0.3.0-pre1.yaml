substitutions:
  name: box3-utilities-display
  friendly_name: Box-3 Utilities Display

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  on_boot:
    priority: 600
    then:
      - display.page.show: home_page
      - script.execute: request_draw

esp32:
  board: esp32s3box
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO6

i2c:
  - id: bus_a
    sda: GPIO08
    scl: GPIO18
    scan: true
    sda_pullup_enabled: true
    scl_pullup_enabled: true
    frequency: 100kHz

font:
  - file:
      type: gfonts
      family: Figtree
      weight: 600
    id: font_title
    size: 22

display:
  - platform: ili9xxx
    model: S3BOX
    id: box_display
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin:
      number: GPIO48
      inverted: true
    invert_colors: false
    update_interval: never
    pages:
      - id: home_page
        lambda: |-
          it.fill(Color(255,255,255));
          it.print(20, 20, id(font_title), Color(0,0,0), "HOME (IDF)");
          it.print(20, 60, id(font_title), Color(0,0,0), "Tap screen anywhere");

      - id: climate_page
        lambda: |-
          it.fill(Color(255,255,255));
          it.print(20, 20, id(font_title), Color(0,0,0), "CLIMATE (IDF)");
          it.print(20, 60, id(font_title), Color(0,0,0), "Tap to go back");

touchscreen:
  - platform: gt911
    id: gt911_touchscreen
    display: box_display
    i2c_id: bus_a
    address: 0x5D
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true

binary_sensor:
  - platform: touchscreen
    page_id: home_page
    id: touch_test_home
    x_min: 0
    x_max: 320
    y_min: 0
    y_max: 240
    on_click:
      then:
        - logger.log: "Touch detected on HOME"
        - display.page.show: climate_page
        - script.execute: request_draw

  - platform: touchscreen
    page_id: climate_page
    id: touch_test_climate
    x_min: 0
    x_max: 320
    y_min: 0
    y_max: 240
    on_click:
      then:
        - logger.log: "Touch detected on CLIMATE"
        - display.page.show: home_page
        - script.execute: request_draw

script:
  - id: request_draw
    mode: restart
    then:
      - component.update: box_display
